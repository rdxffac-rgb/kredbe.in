<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Kred Be - Official Loan Application</title>

<style>
:root {
--primary-blue:#00338d;
--light-blue:#e8f0fe;
--white:#ffffff;
--error-red:#ff0000;
--grey:#cccccc;
}

body{
font-family:'Segoe UI',Tahoma,Geneva,Verdana,sans-serif;
margin:0;
background-color:#f4f7f9;
color:#333;
}

.header{
background-color:var(--primary-blue);
color:white;
padding:15px 20px 60px 20px;
display:flex;
justify-content:space-between;
align-items:center;
border-bottom-left-radius:50% 20%;
border-bottom-right-radius:50% 20%;
}

.logo-img{height:40px;width:auto;}
.welcome-text{font-size:11pt;font-weight:500;}

.container{
max-width:500px;
margin:-40px auto 40px auto;
background:white;
padding:25px;
border-radius:15px;
box-shadow:0 4px 15px rgba(0,0,0,0.1);
}

h2{text-align:center;color:var(--primary-blue);margin-bottom:25px;}

.form-group{margin-bottom:18px;position:relative;}
label{display:block;margin-bottom:6px;font-weight:600;font-size:10pt;}

input,select{
width:100%;
padding:12px;
border:1px solid var(--grey);
border-radius:8px;
box-sizing:border-box;
outline:none;
transition:.3s;
}

.error-input{
border:2px solid var(--error-red)!important;
background-color:#fff8f8;
}

.radio-group{
display:flex;
justify-content:space-between;
gap:10px;
margin-top:5px;
}

.radio-item{
flex:1;
text-align:center;
padding:10px;
border:1px solid var(--grey);
border-radius:8px;
cursor:pointer;
font-size:9pt;
}

.radio-item.active{
background-color:var(--primary-blue);
color:white;
border-color:var(--primary-blue);
}

.input-with-icon{position:relative;}

.input-with-icon span{
position:absolute;
left:10px;
top:12px;
color:#555;
}

.input-with-icon input{padding-left:25px;}

#submit-btn{
width:100%;
padding:16px;
background-color:var(--grey);
color:white;
border:none;
border-radius:8px;
font-size:12pt;
font-weight:bold;
cursor:not-allowed;
transition:.3s;
}

#submit-btn.enabled{
background-color:var(--primary-blue)!important;
cursor:pointer;
box-shadow:0 4px 10px rgba(0,51,141,0.3);
}

#loader-overlay{
display:none;
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(255,255,255,.98);
z-index:1000;
flex-direction:column;
justify-content:center;
align-items:center;
}

.spinner{
width:60px;
height:60px;
border:6px solid var(--light-blue);
border-top:6px solid var(--primary-blue);
border-radius:50%;
animation:spin 1s linear infinite;
}

@keyframes spin{
0%{transform:rotate(0deg);}
100%{transform:rotate(360deg);}
}

#loader-text{
margin-top:25px;
font-weight:bold;
color:var(--primary-blue);
text-align:center;
padding:0 20px;
}
</style>
</head>

<body>

<div class="header">
<div class="logo-area">
<img src="kr.png" class="logo-img">
</div>
<div class="welcome-text">Fill your details</div>
</div>

<div class="container">
<h2>Personal Information</h2>

<div style="display:flex;gap:10px;">
<div class="form-group" style="flex:1;">
<label>First Name</label>
<input type="text" id="first-name">
</div>

<div class="form-group" style="flex:1;">
<label>Last Name</label>
<input type="text" id="last-name">
</div>
</div>

<label>Gender</label>
<div class="radio-group" id="gender-group">
<div class="radio-item" onclick="selectItem('gender',this)">Male</div>
<div class="radio-item" onclick="selectItem('gender',this)">Female</div>
<div class="radio-item" onclick="selectItem('gender',this)">Other</div>
</div>

<br>

<div class="form-group">
<label>Mobile Number</label>
<input type="number" id="mobile" oninput="limitLen(this,10)">
</div>

<div class="form-group">
<label>Select State</label>
<select id="state-select">
<option value="">-- Choose State --</option>
<option>Rajasthan</option>
<option>Delhi</option>
<option>Gujarat</option>
<option>Punjab</option>
<option>Haryana</option>
</select>
</div>

<div class="form-group">
<label>Address Line 1</label>
<input type="text" id="address1">
</div>

<div class="form-group">
<label>Address Line 2</label>
<input type="text" id="address2">
</div>

<div class="form-group">
<label>PIN Code</label>
<input type="number" id="pincode" oninput="limitLen(this,6)">
</div>

<div class="form-group">
<label>Aadhar Number</label>
<input type="number" id="aadhar" oninput="limitLen(this,12)">
</div>

<div class="form-group">
<label>PAN Card Number</label>
<input type="text" id="pan">
</div>

<div class="form-group">
<label>Date of Birth</label>
<input type="date" id="dob">
</div>

<label>Monthly Occupation</label>
<div class="radio-group" id="emp-group">
<div class="radio-item" onclick="selectItem('emp',this)">Self Employed</div>
<div class="radio-item" onclick="selectItem('emp',this)">Homemaker</div>
<div class="radio-item" onclick="selectItem('emp',this)">Salaried</div>
</div>

<br>

<div class="form-group">
<label>Monthly Income</label>
<div class="input-with-icon">
<span>₹</span>
<input type="number" id="income">
</div>
</div>

<div class="form-group">
<label>Requested Loan Amount</label>
<div class="input-with-icon">
<span>₹</span>
<input type="number" id="loan-amount">
</div>
</div>

<div style="display:flex;gap:10px;margin-bottom:25px;">
<input type="checkbox" id="agree">
<label>I declare information is correct</label>
</div>

<button id="submit-btn" onclick="startProcessing()">Check Eligibility</button>

</div>

<div id="loader-overlay">
<div class="spinner"></div>
<div id="loader-text">Analyzing your profile...</div>
</div>

<script>
let selectedGender='';
let selectedEmp='';

function limitLen(el,max){
if(el.value.length>max)el.value=el.value.slice(0,max);
validateForm();
}

function selectItem(type,el){
el.parentElement.querySelectorAll('.radio-item')
.forEach(i=>i.classList.remove('active'));

el.classList.add('active');

if(type==='gender')selectedGender=el.innerText;
else selectedEmp=el.innerText;

validateForm();
}

function validateForm(){
const btn=document.getElementById('submit-btn');

if(
document.getElementById('first-name').value.length>1 &&
document.getElementById('last-name').value.length>1 &&
document.getElementById('mobile').value.length===10 &&
document.getElementById('pincode').value.length===6 &&
selectedGender!=='' &&
selectedEmp!=='' &&
document.getElementById('agree').checked
){
btn.classList.add('enabled');
}else{
btn.classList.remove('enabled');
}
}

function startProcessing(){
if(!document.getElementById('submit-btn').classList.contains('enabled'))return;

const overlay=document.getElementById('loader-overlay');
const text=document.getElementById('loader-text');

overlay.style.display='flex';

const steps=[
"Verifying Name...",
"Validating Aadhaar...",
"Analyzing Credit...",
"Sanctioning Loan..."
];

let i=0;

const interval=setInterval(()=>{
if(i<steps.length){
text.innerText=steps[i++];
}else{
clearInterval(interval);
window.location.href="yourloanamount.html";
}
},3000);
}

document.querySelectorAll('input,select,#agree')
.forEach(el=>{
el.addEventListener('input',validateForm);
el.addEventListener('change',validateForm);
});
</script>

</body>
</html>
